name: Build and Deploy
on:
 push:
   branches:
     - main
 pull_request:
  types:
   - opened
   - synchronize

jobs:
   build:
    runs-on: ubuntu-slim
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    steps:
     - name: Build step
       run: echo "Building the app......"
   deploy:
    runs-on: ubuntu-slim
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
     - name: deploy step
       run: echo "Deployimg the app.." 
